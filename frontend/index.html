<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login System</title>
    <meta name="description" content="A secure, beautiful login portal with advanced JWT authentication.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>
    
    <div class="login-container">
        <h1 class="hidden-title">Secure Login System</h1>
        <h2 id="formTitle">Welcome Back</h2>
        <p id="formSubtitle">Log in to access your secure dashboard.</p>
        
        <form id="loginForm">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" required>
            </div>
            
            <div class="input-group">
                <label for="password" id="passwordLabel">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required>
            </div>
            
            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>
            
            <button type="submit" id="mainBtn">Log In</button>
        </form>
        
        <div class="form-toggles" style="margin-top: 15px; text-align: center; font-size: 0.9rem;">
            <a href="#" id="toggleRegister" style="color: #818cf8; text-decoration: none; margin: 0 10px;">Create Account</a>
            <a href="#" id="toggleReset" style="color: #818cf8; text-decoration: none; margin: 0 10px;">Forgot Password?</a>
            <a href="#" id="toggleLogin" style="color: #818cf8; text-decoration: none; margin: 0 10px; display: none;">Back to Login</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
